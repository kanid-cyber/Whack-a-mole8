<title>เกมตีตัวตุ่นฝึกพิมพ์ไทย</title>
<style>
  html,body{background:#f0f0f0;margin:0;padding:0;}
  body{font-family:'Segoe UI',sans-serif;padding:20px;box-sizing:border-box;}

<div style="max-width:520px;margin:0 auto">
<h2 class="sr-only">เกมตีตัวตุ่นฝึกพิมพ์พยัญชนะ สระ และวรรณยุกต์ไทย ใช้ภาพพื้นหลัง กระดานหลุม ตัวตุ่นที่โผล่ และภาพค้อนตีเมื่อพิมพ์ถูกต้องจากไฟล์ที่แนบ กดตัวอักษรให้ตรงกับตัวตุ่นที่โผล่ขึ้นมาให้ทันเวลา</h2>

// hole centers as % of board image width/height, in board order 1-9 (row-major)
var HOLE_POS = [
  {x:33.9, y:50.0}, {x:53.4, y:50.0}, {x:73.1, y:50.0},
  {x:31.5, y:63.4}, {x:53.2, y:63.4}, {x:74.9, y:63.4},
  {x:28.8, y:78.7}, {x:53.4, y:78.7}, {x:78.0, y:78.7}
];

var board = document.getElementById('board');

var boardImg = document.createElement('img');
boardImg.src = BOARD_URL;
boardImg.style.cssText = "width:100%;display:block;pointer-events:none";
board.appendChild(boardImg);

var HOLES = HOLE_POS.length;
var holes = [];

HOLE_POS.forEach(function(pos, i){
  // invisible tap target centered on the hole opening
  var tap = document.createElement('div');
  tap.style.cssText = "position:absolute;left:"+pos.x+"%;top:"+pos.y+"%;width:22%;aspect-ratio:1;transform:translate(-50%,-50%);cursor:pointer;z-index:3";

  // anchor box: fixed size/position relative to the hole point, mole rises up out of it
  var anchor = document.createElement('div');
  anchor.style.cssText = "position:absolute;left:"+pos.x+"%;top:"+pos.y+"%;width:36%;transform:translate(-50%,-50%);pointer-events:none;z-index:2;overflow:visible";

  var moleWrap = document.createElement('div');
  moleWrap.style.cssText = "width:100%;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(55%);transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .4s ease-out";

  var label = document.createElement('div');
  label.style.cssText = "font-size:26px;font-weight:800;color:#fff;line-height:1;margin-bottom:-26%;white-space:nowrap;position:relative;z-index:3;text-shadow:-1.5px -1.5px 0 #000,1.5px -1.5px 0 #000,-1.5px 1.5px 0 #000,1.5px 1.5px 0 #000,0 2px 4px rgba(0,0,0,.5)";
  moleWrap.appendChild(label);

  var moleImg = document.createElement('img');
  moleImg.src = MOLE_URL;
  moleImg.style.cssText = "width:100%;height:auto;display:block";
  moleWrap.appendChild(moleImg);

  anchor.appendChild(moleWrap);

  var hammerImg = document.createElement('img');
  hammerImg.src = HAMMER_URL;
  hammerImg.style.cssText = "position:absolute;left:50%;top:32%;width:55%;opacity:0;pointer-events:none;z-index:4;transform:translate(-50%,-85%) rotate(-50deg) scale(.8)";
  anchor.appendChild(hammerImg);

  var bar = document.createElement('div');
  bar.style.cssText = "position:absolute;left:"+pos.x+"%;top:calc("+pos.y+"% - 12%);width:16%;height:3px;transform:translateX(-50%);background:var(--border-accent);z-index:3";

  board.appendChild(anchor);
  board.appendChild(tap);
  board.appendChild(bar);
  holes.push({el:tap, moleWrap:moleWrap, label:label, moleImg:moleImg, hammerImg:hammerImg, bar:bar, active:false, char:null, timeoutId:null});
});
holes.forEach(function(hObj, idx){
  hObj.el.addEventListener('click', function(){ tryWhack(idx); });
});

var score=0, combo=0, bestCombo=0, misses=0, hits=0, timeLeft=60, running=false, spawnTimer=null, tickTimer=null;
var spawnDelay = 850;

function setStats(){
  document.getElementById('score').textContent = score;
  document.getElementById('combo').textContent = combo;
  document.getElementById('miss').textContent = misses;
  document.getElementById('time').textContent = timeLeft;
}

function clearHole(idx){
  var h = holes[idx];
  h.active = false;
  h.char = null;
  h.moleImg.src = MOLE_URL;
  h.moleWrap.style.transition = "none";
  h.moleWrap.style.opacity = 0;
  h.moleWrap.style.transform = "translateY(55%)";
  h.bar.style.transition = "none";
  h.bar.style.width = "16%";
  h.hammerImg.style.animation = "none";
  h.hammerImg.style.opacity = 0;
  if(h.timeoutId){ clearTimeout(h.timeoutId); h.timeoutId=null; }
}

function spawnMole(){
  if(!running) return;
  var freeIdx = [];
  holes.forEach(function(h,i){ if(!h.active) freeIdx.push(i); });
  if(freeIdx.length===0) return;
  var idx = freeIdx[Math.floor(Math.random()*freeIdx.length)];
  var activeChars = holes.filter(function(h){return h.active;}).map(function(h){return h.char;});
  var pool = KEYS.filter(function(k){ return activeChars.indexOf(k)===-1; });
  var char = pool[Math.floor(Math.random()*pool.length)];
  var h = holes[idx];
  h.active = true;
  h.char = char;
  h.moleImg.src = MOLE_URL;
  h.label.textContent = disp(char);
  h.moleWrap.style.transition = "transform .5s cubic-bezier(.34,1.56,.64,1),opacity .4s ease-out";
  h.moleWrap.style.opacity = 1;
  h.moleWrap.style.transform = "translateY(0)";
  var duration = 1900;
  h.bar.style.transition = "none";
  h.bar.style.width = "16%";
  requestAnimationFrame(function(){
    h.bar.style.transition = "width "+duration+"ms linear";
    h.bar.style.width = "0%";
  });
  h.timeoutId = setTimeout(function(){
    if(h.active){
      clearHole(idx);
      combo = 0;
      misses++;
      setStats();
    }
  }, duration);
}

function tryWhack(idx){
  var h = holes[idx];
  if(!h.active) return false;
  h.active = false;
  if(h.timeoutId){ clearTimeout(h.timeoutId); h.timeoutId=null; }
  h.moleImg.src = HIT_URL;
  h.moleWrap.style.transition = "transform .1s";
  h.moleWrap.style.transform = "translateY(6%) scale(0.96)";
  h.hammerImg.style.animation = "none";
  void h.hammerImg.offsetWidth;
  h.hammerImg.style.animation = "hammerHit .42s ease-out";
  setTimeout(function(){
    h.moleWrap.style.transition = "opacity .12s,transform .12s";
    h.moleWrap.style.opacity = 0;
    h.moleWrap.style.transform = "translateY(55%)";
    h.char = null;
  }, 260);
  score += 10 + Math.min(combo,10);
  combo++;
  hits++;
  if(combo>bestCombo) bestCombo = combo;
  setStats();
  return true;
}

function onKey(e){
  if(!running) return;
  var k = e.key;
  var match = holes.findIndex(function(h){ return h.active && h.char===k; });
  if(match!==-1){ tryWhack(match); }
}

function startGame(){
  if(running) return;
  running = true;
  score=0; combo=0; bestCombo=0; misses=0; hits=0; timeLeft=60;
  document.getElementById('result').style.display='none';
  document.getElementById('startBtn').textContent = 'กำลังเล่น...';
  setStats();
  spawnTimer = setInterval(spawnMole, spawnDelay);
  tickTimer = setInterval(function(){
    timeLeft--;
    setStats();
    if(timeLeft<=0) endGame();
  }, 1000);
}

function endGame(){
  running = false;
  clearInterval(spawnTimer);
  clearInterval(tickTimer);
  holes.forEach(function(h,i){ clearHole(i); });
  document.getElementById('startBtn').textContent = 'เล่นอีกครั้ง';
  var total = hits+misses;
  var acc = total>0 ? Math.round((hits/total)*100) : 0;
  document.getElementById('resultText').innerHTML =
    "คะแนนรวม <b>"+score+"</b> ตีโดน <b>"+hits+"</b> ครั้ง พลาด <b>"+misses+"</b> ครั้ง<br>ความแม่นยำ <b>"+acc+"%</b> คอมโบสูงสุด <b>"+bestCombo+"</b>";
  document.getElementById('result').style.display='block';
}

document.getElementById('startBtn').addEventListener('click', startGame);
window.addEventListener('keydown', onKey);
})();
</script>
</body></html>
